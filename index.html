<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[FWU] Mayesh Weekly Order</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --fwu-blue: #0056b3; }
        body { background-color: #f4f7f6; color: #333; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        .header-section { background: white; padding: 25px 0; border-bottom: 4px solid var(--fwu-blue); text-align: center; margin-bottom: 30px; }
        .logo { max-width: 250px; }
        
        .card-title { color: var(--fwu-blue); font-weight: 700; border-left: 5px solid var(--fwu-blue); padding-left: 12px; margin-bottom: 20px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }

        /* Section 1: Pack Rate Table */
        .pack-table { font-size: 0.85rem; }
        .pack-table th { background-color: #f1f3f5; border: 1px solid #dee2e6; text-align: center; }
        .pack-table td { border: 1px solid #dee2e6; text-align: center; padding: 6px; }

        /* Section 4: Item Box 修正圖片高度 */
        .item-box {
            border: 1px solid #eee;
            border-radius: 12px;
            background: white;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .item-box:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        
        /* 1. 調整圖片高度為至少 1414px (在網頁顯示中維持比例) */
        .item-img-container {
            width: 100%;
            height: 400px; /* 網頁呈現的高度，原始檔會以比例縮放 */
            overflow: hidden;
            background: #f0f0f0;
        }
        .item-img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* 改成 contain 確保整張 1414px 高度的圖能完整顯示 */
        }

        .item-content { padding: 18px; flex-grow: 1; display: flex; flex-direction: column; }
        .item-name { font-size: 1.25rem; font-weight: 700; color: #1a1a1a; margin-bottom: 10px; }
        .item-intro { font-size: 0.9rem; color: #6c757d; line-height: 1.5; margin-bottom: 15px; }
        
        .order-action { margin-top: auto; padding-top: 15px; border-top: 1px solid #f0f0f0; }
        .unit-label { background: #e9ecef; border: 1px solid #ced4da; border-left: none; padding: 0.375rem 0.75rem; border-radius: 0 0.375rem 0.375rem 0; font-weight: 600; min-width: 60px; text-align: center; }
    </style>
</head>
<body>

<div class="header-section">
    <img src="https://images.squarespace-cdn.com/content/689dd63b4e427050b1bc75a0/b97177cc-9349-4e60-b7ce-83c7097ba6aa/logo+%E9%80%8F%E6%98%8E.png" class="logo">
    <h2 class="mt-2">[FWU] Mayesh Weekly Order</h2>
</div>

<div class="container pb-5">
    <div class="card" id="packRateCard">
        <div class="card-body">
            <h5 class="card-title">Section 1: Shipping Pack Rate Reference</h5>
            <div class="table-responsive">
                <table class="table pack-table table-sm mb-0">
                    <thead id="packRateHeader"></thead>
                    <tbody id="packRateBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <form id="orderForm">
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Section 2: Location</h5>
                        <select name="location" class="form-select form-select-lg" required>
                            <option value="">-- Select Market --</option>
                            <option value="Loc1">Loc1-- LA Market</option>
                            <option value="Loc3">Loc3-- Orange County</option>
                            <option value="Loc5">Loc5-- Carlsbad</option>
                            <option value="Loc6">Loc6-- Riverside</option>
                            <option value="Loc9">Loc9-- LAX</option>
                            <option value="Loc10">Loc10-- Phoenix</option>
                            <option value="Loc12">Loc12-- Oxnard</option>
                            <option value="Loc19">Loc19-- Portland</option>
                            <option value="Loc21">Loc21-- Seattle</option>
                            <option value="Loc25">Loc25-- San Francisco</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Section 3: Shipping Date</h5>
                        <input type="date" name="shippingDate" class="form-control form-control-lg" required>
                    </div>
                </div>
            </div>
        </div>

        <h5 class="card-title mb-4">Section 4: Variety Order List</h5>
        <div id="varietyGrid" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 mb-5">
            <p class="text-center w-100">Loading flowers...</p>
        </div>

        <button type="submit" id="submitBtn" class="btn btn-primary btn-lg w-100 shadow py-3 fw-bold">SUBMIT WEEKLY ORDER</button>
    </form>
</div>

<div class="modal fade" id="summaryModal" data-bs-backdrop="static" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content border-0">
            <div class="modal-header bg-success text-white"><h5>Order Submitted!</h5></div>
            <div class="modal-body" id="summaryList"></div>
            <div class="modal-footer">
                <button class="btn btn-outline-success" onclick="downloadCSV()">Download CSV</button>
                <button class="btn btn-secondary" onclick="window.location.reload()">New Order</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ⚠️ 這裡一定要換成您新部署的網址
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxxMVL5vqHNUHXg5Ixxy3luzugYvh0MpsVgZCrfdmLSZmhHJuGar7P6mSZ9cFgJeBdNJg/exec';

    window.onload = function() {
        fetch(`${GAS_URL}?action=init`)
        .then(res => res.json())
        .then(data => {
            renderPackRate(data.packRate);
            renderVarieties(data.varieties);
        })
        .catch(err => alert("Error loading data. Please check GAS URL and permissions."));
    };

    function renderPackRate(data) {
        if(!data || data.length === 0) return;
        document.getElementById('packRateHeader').innerHTML = `<tr>${data[0].map(h => `<th>${h}</th>`).join('')}</tr>`;
        document.getElementById('packRateBody').innerHTML = data.slice(1).map(row => `<tr>${row.map(cell => `<td>${cell || ''}</td>`).join('')}</tr>`).join('');
    }

    function renderVarieties(vars) {
        const grid = document.getElementById('varietyGrid');
        grid.innerHTML = vars.map(v => {
            const name = v[0];
            const intro = v[1] || 'Premium Quality';
            const imgUrl = v[2] || 'https://via.placeholder.com/1000x1414?text=FWU+Flower';
            
            // 2. 修正下單單位邏輯：嚴格判斷 Oncidium
            // 只要名稱包含 Oncidium (不限大小寫)，單位就是 BU，其餘為 Box
            const isOncidium = name.toLowerCase().includes('oncidium');
            const unit = isOncidium ? 'BU' : 'Box';

            return `
                <div class="col">
                    <div class="item-box">
                        <div class="item-img-container">
                            <img src="${imgUrl}" class="item-img" alt="${name}">
                        </div>
                        <div class="item-content">
                            <div class="item-name">${name} ${isOncidium ? '<span class="badge bg-info text-dark" style="font-size:0.7rem">BU</span>' : ''}</div>
                            <div class="item-intro">${intro}</div>
                            <div class="order-action">
                                <div class="input-group">
                                    <span class="input-group-text bg-white">Qty</span>
                                    <input type="number" class="form-control order-qty" data-name="${name}" data-unit="${unit}" min="0" value="0">
                                    <span class="unit-label">${unit}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // 表單處理邏輯 (與先前一致)
    document.getElementById('orderForm').onsubmit = function(e) {
        e.preventDefault();
        const items = [];
        document.querySelectorAll('.order-qty').forEach(input => {
            if(parseInt(input.value) > 0) {
                items.push({ name: input.dataset.name, qty: input.value, unit: input.dataset.unit });
            }
        });
        if(items.length === 0) return alert("Please enter quantity.");
        
        const payload = { location: document.querySelector('[name="location"]').value, shippingDate: document.querySelector('[name="shippingDate"]').value, items: items };
        
        fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })
        .then(res => res.json())
        .then(res => {
            if(res.result === 'success') {
                window.lastItems = items;
                let html = `<p>Location: ${payload.location}</p><table class="table table-sm">`;
                items.forEach(i => html += `<tr><td>${i.name}</td><td>${i.qty} ${i.unit}</td></tr>`);
                document.getElementById('summaryList').innerHTML = html + "</table>";
                new bootstrap.Modal(document.getElementById('summaryModal')).show();
            }
        });
    };

    function downloadCSV() {
        let csv = "Variety,Quantity,Unit\n";
        window.lastItems.forEach(i => csv += `"${i.name}",${i.qty},${i.unit}\n`);
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
        link.download = `Order_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
    }
</script>
</body>
</html>
