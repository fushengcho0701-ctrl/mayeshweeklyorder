<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[FWU] Mayesh Weekly Order</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --fwu-main: #95c51b; --fwu-dark: #7aa314; --fwu-light: #f9fff0; }
        body { background-color: #f4f7f6; color: #333; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        
        /* Header & Nav */
        .header-section { background: white; padding: 30px 0 10px 0; border-bottom: 5px solid var(--fwu-main); text-align: center; margin-bottom: 20px; }
        .header-title { color: var(--fwu-main); font-weight: 800; letter-spacing: 2px; margin-bottom: 20px; }
        .nav-pills .nav-link { color: #666; font-weight: 600; border-radius: 30px; padding: 10px 30px; margin: 0 10px; border: 1px solid #ddd; }
        .nav-pills .nav-link.active { background-color: var(--fwu-main); border-color: var(--fwu-main); color: white; }

        .card-title { color: var(--fwu-main); font-weight: 700; border-left: 5px solid var(--fwu-main); padding-left: 12px; margin-bottom: 20px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }

        /* Catalog Group Card - 大項目大圖設計 */
        .group-card { border-radius: 15px; overflow: hidden; background: white; border: 1px solid #eee; transition: 0.3s; height: 100%; }
        .group-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .group-img-container { width: 100%; height: 500px; background: #fff; border-bottom: 2px solid var(--fwu-main); }
        .group-img { width: 100%; height: 100%; object-fit: contain; }
        .group-body { padding: 25px; }
        .group-label { color: var(--fwu-main); font-size: 0.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        .group-name { font-size: 2rem; font-weight: 800; margin-bottom: 15px; }
        
        /* Catalog Pack Rate Table (精簡版) */
        .catalog-table { font-size: 0.9rem; width: 100%; margin-top: 10px; }
        .catalog-table th { color: #888; font-weight: 600; padding-bottom: 8px; border-bottom: 1px solid #eee; }
        .catalog-table td { padding: 8px 0; border-bottom: 1px dotted #eee; }

        /* Order List - 下單頁面樣式 */
        .order-item-row { background: white; border-radius: 10px; padding: 15px; margin-bottom: 10px; border: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
        .unit-label { background: #f8f9fa; border: 1px solid #ced4da; border-left: none; padding: 0.375rem 0.75rem; border-radius: 0 0.375rem 0.375rem 0; font-weight: 800; min-width: 65px; text-align: center; }
        .unit-bu { color: white; background: var(--fwu-main); border-color: var(--fwu-main); }
        .btn-submit { background-color: var(--fwu-main); border: none; padding: 18px; font-weight: bold; border-radius: 12px; font-size: 1.25rem; color: white; }
    </style>
</head>
<body>

<div class="header-section shadow-sm">
    <h1 class="header-title text-uppercase">[FWU] Mayesh Weekly Order</h1>
    <ul class="nav nav-pills justify-content-center mb-3" id="mainTab" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#catalog">1. CATALOG</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#order">2. PLACE ORDER</button></li>
    </ul>
</div>

<div class="container pb-5">
    <div class="tab-content">
        
        <div class="tab-pane fade show active" id="catalog">
            <h5 class="card-title mb-4">Product Categories & Packing Rates</h5>
            <div id="catalogGroupGrid" class="row g-4">
                <div class="text-center py-5"><div class="spinner-border text-success"></div></div>
            </div>
        </div>

        <div class="tab-pane fade" id="order">
            <form id="orderForm">
                <div class="row">
                    <div class="col-md-6"><div class="card"><div class="card-body">
                        <h5 class="card-title">Location</h5>
                        <select name="location" id="inputLocation" class="form-select form-select-lg" required>
                            <option value="">-- Select Market --</option>
                            <option value="Loc1">Loc1-- LA Market</option>
                            <option value="Loc3">Loc3-- Orange County</option>
                            <option value="Loc5">Loc5-- Carlsbad</option>
                            <option value="Loc6">Loc6-- Riverside</option>
                            <option value="Loc9">Loc9-- LAX</option>
                            <option value="Loc10">Loc10-- Phoenix</option>
                            <option value="Loc12">Loc12-- Oxnard</option>
                            <option value="Loc19">Loc19-- Portland</option>
                            <option value="Loc21">Loc21-- Seattle</option>
                            <option value="Loc25">Loc25-- San Francisco</option>
                        </select>
                    </div></div></div>
                    <div class="col-md-6"><div class="card"><div class="card-body">
                        <h5 class="card-title">Shipping Date</h5>
                        <input type="date" name="shippingDate" id="inputDate" class="form-control form-control-lg" required>
                    </div></div></div>
                </div>

                <div id="orderListContainer">
                    </div>

                <button type="submit" id="submitBtn" class="btn btn-submit w-100 shadow mt-4">SUBMIT WEEKLY ORDER</button>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="summaryModal" data-bs-backdrop="static" tabindex="-1">
    <div class="modal-dialog modal-lg"><div class="modal-content"><div class="modal-header bg-success text-white"><h5>Order Confirmed!</h5></div><div class="modal-body p-4" id="summaryList"></div><div class="modal-footer"><button class="btn btn-outline-success fw-bold" onclick="downloadCSV()">Download CSV</button><button class="btn btn-secondary" onclick="window.location.reload()">New Order</button></div></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxxMVL5vqHNUHXg5Ixxy3luzugYvh0MpsVgZCrfdmLSZmhHJuGar7P6mSZ9cFgJeBdNJg/exec';

    window.onload = function() {
        fetch(`${GAS_URL}?action=init`)
        .then(res => res.json())
        .then(data => {
            renderCatalog(data.varieties, data.packRate);
            renderOrderList(data.varieties);
        });
    };

    function renderCatalog(vars, packRates) {
        const grid = document.getElementById('catalogGroupGrid');
        // 1. 根據 D 欄 (Category) 分群
        const groups = {};
        vars.forEach(v => {
            const cat = v[3] || 'Others';
            if(!groups[cat]) groups[cat] = { name: cat, img: v[2], specs: [] };
        });

        // 2. 匹配 Pack Rate 到各群組
        packRates.slice(1).forEach(p => {
            const cat = p[0]; // 假設 Pack Rate 第一欄是類別名稱
            if(groups[cat]) {
                groups[cat].specs.push({ size: p[1], box1: p[2], rate1: p[3], box2: p[4], rate2: p[5] });
            }
        });

        grid.innerHTML = Object.values(groups).map(g => `
            <div class="col-lg-6">
                <div class="group-card shadow-sm">
                    <div class="group-img-container">
                        <img src="${g.img || 'https://via.placeholder.com/1000x1414'}" class="group-img">
                    </div>
                    <div class="group-body">
                        <div class="group-label">Category</div>
                        <div class="group-name">${g.name}</div>
                        <table class="catalog-table">
                            <thead><tr><th>Spec</th><th>${g.specs[0]?.box1 || 'SB'}</th><th>${g.specs[0]?.box2 || 'HSB'}</th></tr></thead>
                            <tbody>
                                ${g.specs.map(s => `<tr><td>${s.size}</td><td>${s.rate1}</td><td>${s.rate2 || '-'}</td></tr>`).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function renderOrderList(vars) {
        const container = document.getElementById('orderListContainer');
        const groups = {};
        vars.forEach(v => {
            const cat = v[3] || 'Others';
            if(!groups[cat]) groups[cat] = [];
            groups[cat].push(v);
        });

        container.innerHTML = Object.keys(groups).map(catName => `
            <div class="card mb-4">
                <div class="card-body">
                    <h5 class="card-title">${catName}</h5>
                    ${groups[catName].map(v => {
                        const unit = catName.toLowerCase().includes('oncidium') ? 'BU' : 'Box';
                        return `
                        <div class="order-item-row">
                            <div class="fw-bold">${v[0]} <small class="text-muted d-block">${v[1] || ''}</small></div>
                            <div class="input-group" style="width: 200px;">
                                <input type="number" class="form-control order-qty" data-name="${v[0]}" data-unit="${unit}" min="0" value="0">
                                <span class="unit-label ${unit === 'BU' ? 'unit-bu' : ''}">${unit}</span>
                            </div>
                        </div>`;
                    }).join('')}
                </div>
            </div>
        `).join('');
    }

    // 提交與下載邏輯維持不變...
    document.getElementById('orderForm').onsubmit = function(e) {
        e.preventDefault();
        const items = [];
        document.querySelectorAll('.order-qty').forEach(input => {
            if(parseInt(input.value) > 0) items.push({ name: input.dataset.name, qty: input.value, unit: input.dataset.unit });
        });
        if(items.length === 0) return alert("Select items.");
        const payload = { location: document.getElementById('inputLocation').value, shippingDate: document.getElementById('inputDate').value, items: items };
        fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) }).then(res => res.json()).then(res => {
            window.lastOrder = payload;
            let html = `<h6>Market: ${payload.location}</h6><table class="table">`;
            items.forEach(i => html += `<tr><td>${i.name}</td><td class="text-end">${i.qty} ${i.unit}</td></tr>`);
            document.getElementById('summaryList').innerHTML = html + "</table>";
            new bootstrap.Modal(document.getElementById('summaryModal')).show();
        });
    };

    function downloadCSV() {
        const info = window.lastOrder;
        let csv = "\uFEFFLocation,${info.location}\nDate,${info.shippingDate}\n\nVariety,Qty,Unit\n";
        info.items.forEach(i => csv += `"${i.name}",${i.qty},${i.unit}\n`);
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
        link.download = `Order_${info.location}.csv`;
        link.click();
    }
</script>
</body>
</html>
