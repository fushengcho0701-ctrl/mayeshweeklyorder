<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[FWU] Mayesh Weekly Order</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --fwu-main: #95c51b; --fwu-dark: #7aa314; }
        body { background-color: #f4f7f6; color: #333; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        
        /* Header & Navigation */
        .header-section { background: white; padding: 30px 0 10px 0; border-bottom: 5px solid var(--fwu-main); text-align: center; margin-bottom: 20px; }
        .header-title { color: var(--fwu-main); font-weight: 800; letter-spacing: 2px; margin-bottom: 20px; }
        .nav-pills .nav-link { color: #666; font-weight: 600; border-radius: 30px; padding: 10px 30px; margin: 0 10px; border: 1px solid #ddd; }
        .nav-pills .nav-link.active { background-color: var(--fwu-main); border-color: var(--fwu-main); color: white; }

        .card-title { color: var(--fwu-main); font-weight: 700; border-left: 5px solid var(--fwu-main); padding-left: 12px; margin-bottom: 20px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }

        /* Section 1: Interactive Pack Rate Tool */
        .tool-box { background: #fff; padding: 25px; border-radius: 12px; border: 2px solid var(--fwu-main); }
        .result-display { background: var(--fwu-main); color: white; padding: 20px; border-radius: 10px; text-align: center; margin-top: 20px; }
        .result-val { font-size: 2.5rem; font-weight: 800; display: block; }
        .result-label { font-size: 0.9rem; text-transform: uppercase; font-weight: 600; opacity: 0.9; }

        /* Gallery Boxes */
        .item-box { border-radius: 15px; overflow: hidden; background: white; border: 1px solid #eee; transition: 0.3s; height: 100%; display: flex; flex-direction: column; }
        .item-box:hover { transform: translateY(-5px); box-shadow: 0 12px 30px rgba(0,0,0,0.1); }
        .img-container { width: 100%; height: 480px; background: #fff; overflow: hidden; border-bottom: 1px solid #f0f0f0; }
        .img-item { width: 100%; height: 100%; object-fit: contain; }
        .box-body { padding: 20px; flex-grow: 1; }
        .box-variety { color: var(--fwu-main); font-size: 0.8rem; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
        .box-item-name { font-size: 1.3rem; font-weight: 800; margin-bottom: 8px; color: #1a1a1a; }
        
        .order-control { margin-top: auto; padding: 15px 20px; border-top: 1px solid #eee; }
        .unit-label { background: #f8f9fa; border: 1px solid #ced4da; border-left: none; padding: 0.375rem 0.75rem; border-radius: 0 0.375rem 0.375rem 0; font-weight: 800; min-width: 65px; text-align: center; }
        .unit-bu { color: white; background: var(--fwu-main); border-color: var(--fwu-main); }

        .btn-submit { background-color: var(--fwu-main); border: none; padding: 18px; font-weight: bold; border-radius: 12px; font-size: 1.25rem; color: white; }
    </style>
</head>
<body>

<div class="header-section shadow-sm">
    <h1 class="header-title text-uppercase">[FWU] Mayesh Weekly Order</h1>
    <ul class="nav nav-pills justify-content-center mb-3" id="mainTab" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#catalogTab">1. CATALOG</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#orderTab">2. PLACE ORDER</button></li>
    </ul>
</div>

<div class="container pb-5">
    <div class="tab-content">
        
        <div class="tab-pane fade show active" id="catalogTab">
            
            <div class="card">
                <div class="card-body tool-box shadow-sm">
                    <h5 class="card-title text-center mb-4">Quick Packing Rate Calculator</h5>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">1. Select Variety Type</label>
                            <select id="toolVariety" class="form-select form-select-lg" onchange="updateSpecOptions()">
                                <option value="">-- Choose Flower Type --</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">2. Select Specification</label>
                            <select id="toolSpec" class="form-select form-select-lg" disabled onchange="calculateRate()">
                                <option value="">-- Select Spec --</option>
                            </select>
                        </div>
                    </div>
                    <div id="rateResult" class="result-display d-none">
                        <span class="result-label">Calculated Packing Rate</span>
                        <span class="result-val" id="finalRate">-</span>
                    </div>
                </div>
            </div>

            <h5 class="card-title mb-4">Visual Gallery</h5>
            <div id="catalogGrid" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4"></div>
        </div>

        <div class="tab-pane fade" id="orderTab">
            <form id="orderForm">
                <div class="row g-3">
                    <div class="col-md-6"><div class="card"><div class="card-body">
                        <h5 class="card-title">Location</h5>
                        <select name="location" id="inputLocation" class="form-select form-select-lg" required>
                            <option value="">-- Select Market --</option>
                            <option value="Loc1">Loc1-- LA Market</option>
                            <option value="Loc3">Loc3-- Orange County</option>
                            <option value="Loc5">Loc5-- Carlsbad</option>
                            <option value="Loc6">Loc6-- Riverside</option>
                            <option value="Loc9">Loc9-- LAX</option>
                            <option value="Loc10">Loc10-- Phoenix</option>
                            <option value="Loc12">Loc12-- Oxnard</option>
                            <option value="Loc19">Loc19-- Portland</option>
                            <option value="Loc21">Loc21-- Seattle</option>
                            <option value="Loc25">Loc25-- San Francisco</option>
                        </select>
                    </div></div></div>
                    <div class="col-md-6"><div class="card"><div class="card-body">
                        <h5 class="card-title">Shipping Date</h5>
                        <input type="date" name="shippingDate" id="inputDate" class="form-control form-control-lg" required>
                    </div></div></div>
                </div>

                <h5 class="card-title mt-4 mb-4">Select Items & Quantity</h5>
                <div id="orderGrid" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 mb-5"></div>

                <button type="submit" id="submitBtn" class="btn btn-submit w-100 shadow">SUBMIT WEEKLY ORDER</button>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="summaryModal" data-bs-backdrop="static" tabindex="-1">
    <div class="modal-dialog modal-lg"><div class="modal-content border-0 shadow-lg"><div class="modal-header bg-success text-white"><h5>Order Submitted!</h5></div><div class="modal-body p-4" id="summaryList"></div><div class="modal-footer bg-light"><button class="btn btn-outline-success fw-bold" onclick="downloadCSV()">Download Record</button><button class="btn btn-secondary" onclick="window.location.reload()">New Order</button></div></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxxMVL5vqHNUHXg5Ixxy3luzugYvh0MpsVgZCrfdmLSZmhHJuGar7P6mSZ9cFgJeBdNJg/exec';
    let packRateData = [];

    window.onload = function() {
        fetch(`${GAS_URL}?action=init`)
        .then(res => res.json())
        .then(data => {
            packRateData = data.packRate;
            initTool(data.packRate);
            renderGrid(data.varieties, 'catalogGrid', false);
            renderGrid(data.varieties, 'orderGrid', true);
        });
    };

    function initTool(rates) {
        const select = document.getElementById('toolVariety');
        // 取得所有不重複的類別
        const types = [...new Set(rates.slice(1).map(r => r[0]))];
        types.forEach(t => select.innerHTML += `<option value="${t}">${t}</option>`);
    }

    function updateSpecOptions() {
        const type = document.getElementById('toolVariety').value;
        const specSelect = document.getElementById('toolSpec');
        const resultDiv = document.getElementById('rateResult');
        
        specSelect.innerHTML = '<option value="">-- Select Spec --</option>';
        resultDiv.classList.add('d-none');

        if(!type) {
            specSelect.disabled = true;
            return;
        }

        specSelect.disabled = false;
        const specs = packRateData.filter(r => r[0] === type);
        specs.forEach(s => specSelect.innerHTML += `<option value="${s[2]}">${s[1]}</option>`);
    }

    function calculateRate() {
        const rate = document.getElementById('toolSpec').value;
        const type = document.getElementById('toolVariety').value;
        const display = document.getElementById('finalRate');
        const resultDiv = document.getElementById('rateResult');
        
        if(!rate) {
            resultDiv.classList.add('d-none');
            return;
        }

        const unit = type.toLowerCase().includes('oncidium') ? 'BU' : 'Box';
        display.innerText = `${rate} ${unit}`;
        resultDiv.classList.remove('d-none');
    }

    function renderGrid(vars, containerId, isOrder) {
        const grid = document.getElementById(containerId);
        grid.innerHTML = vars.map(v => {
            const name = v[0], intro = v[1], img = v[2], type = v[3];
            const unit = type.toLowerCase().includes('oncidium') ? 'BU' : 'Box';

            return `
                <div class="col">
                    <div class="item-box shadow-sm">
                        <div class="img-container"><img src="${img || 'https://via.placeholder.com/1000x1414'}" class="img-item"></div>
                        <div class="box-body">
                            <div class="box-variety">${type}</div>
                            <div class="box-item-name">${name}</div>
                            <p class="text-muted small">${intro || ''}</p>
                        </div>
                        ${isOrder ? `
                        <div class="order-control">
                            <div class="input-group">
                                <span class="input-group-text bg-white fw-bold">Qty</span>
                                <input type="number" class="form-control order-qty" data-name="${name}" data-unit="${unit}" min="0" value="0">
                                <span class="unit-label ${unit === 'BU' ? 'unit-bu' : ''}">${unit}</span>
                            </div>
                        </div>` : ''}
                    </div>
                </div>`;
        }).join('');
    }

    // 提交與下載邏輯
    document.getElementById('orderForm').onsubmit = function(e) {
        e.preventDefault();
        const items = [];
        document.querySelectorAll('.order-qty').forEach(input => {
            if(parseInt(input.value) > 0) items.push({ name: input.dataset.name, qty: input.value, unit: input.dataset.unit });
        });
        if(items.length === 0) return alert("Select at least one item.");
        const payload = { location: document.getElementById('inputLocation').value, shippingDate: document.getElementById('inputDate').value, items: items };
        fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) }).then(res => res.json()).then(res => {
            window.lastOrder = payload;
            let html = `<h6>Market: ${payload.location}</h6><table class="table">`;
            items.forEach(i => html += `<tr><td>${i.name}</td><td class="text-end"><strong>${i.qty} ${i.unit}</strong></td></tr>`);
            document.getElementById('summaryList').innerHTML = html + "</table>";
            new bootstrap.Modal(document.getElementById('summaryModal')).show();
        });
    };

    function downloadCSV() {
        const info = window.lastOrder;
        let csv = "\uFEFFLocation,${info.location}\nDate,${info.shippingDate}\n\nVariety,Qty,Unit\n";
        info.items.forEach(i => csv += `"${i.name}",${i.qty},${i.unit}\n`);
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
        link.download = `FWU_Order_${info.location}.csv`;
        link.click();
    }
</script>
</body>
</html>
