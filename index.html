<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[FWU] Mayesh Weekly Order System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --fwu-main: #95c51b; --fwu-dark: #7aa314; --fwu-light: #f4f7f6; }
        body { background-color: var(--fwu-light); color: #333; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        
        /* Header & Nav */
        .header-section { background: white; padding: 30px 0 10px 0; border-bottom: 5px solid var(--fwu-main); text-align: center; margin-bottom: 20px; }
        .header-title { color: var(--fwu-main); font-weight: 800; letter-spacing: 2px; margin-bottom: 20px; }
        .nav-pills .nav-link { color: #666; font-weight: 600; border-radius: 30px; padding: 10px 25px; margin: 0 5px; border: 1px solid #ddd; font-size: 0.9rem; }
        .nav-pills .nav-link.active { background-color: var(--fwu-main); border-color: var(--fwu-main); color: white; }

        .card-title { color: var(--fwu-main); font-weight: 700; border-left: 5px solid var(--fwu-main); padding-left: 12px; margin-bottom: 20px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }

        /* Compact Tool Box */
        .tool-box { background: #fff; padding: 20px; border-radius: 12px; border: 1px solid var(--fwu-main); }
        .result-inline { background: var(--fwu-main); color: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; height: 46px; font-weight: 800; font-size: 1.2rem; }

        /* Grid Setup (用於 PLACE ORDER 頁面卡片維持 RWD) */
        .row-cols-custom-4 > .col { flex: 0 0 auto; width: 25%; }
        @media (max-width: 1400px) { .row-cols-custom-4 > .col { width: 33.33%; } }
        @media (max-width: 992px) { .row-cols-custom-4 > .col { width: 50%; } }
        @media (max-width: 576px) { .row-cols-custom-4 > .col { width: 100%; } }

        /* Place Order 卡片樣式 */
        .item-box { border-radius: 12px; overflow: hidden; background: white; border: 1px solid #eee; transition: 0.3s; height: 100%; display: flex; flex-direction: column; }
        .img-container { width: 100%; height: 280px; background: #fff; overflow: hidden; border-bottom: 1px solid #f0f0f0; }
        .img-item { width: 100%; height: 100%; object-fit: contain; }
        .box-body { padding: 15px; flex-grow: 1; }
        .box-variety { color: var(--fwu-main); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; }
        .box-item-name { font-size: 1.1rem; font-weight: 700; color: #1a1a1a; margin-top: 5px; margin-bottom: 2px; }
        
        /* 品種介紹說明的文字樣式 */
        .box-intro { font-size: 0.85rem; color: #666; font-style: italic; margin-top: 3px; line-height: 1.3; }
        
        .order-control { padding: 10px 15px; border-top: 1px solid #eee; background: #fafafa; }
        .unit-label { background: #f8f9fa; border: 1px solid #ced4da; border-left: none; padding: 0.375rem 0.5rem; border-radius: 0 0.375rem 0.375rem 0; font-weight: 800; min-width: 60px; text-align: center; font-size: 0.85rem; }
        .unit-bu { color: white; background: var(--fwu-main); border-color: var(--fwu-main); }

        .btn-submit { background-color: var(--fwu-main); border: none; padding: 18px; font-weight: bold; border-radius: 12px; font-size: 1.25rem; color: white; }

        /* Price List & History Table UI/UX 優化樣式 */
        .table-price-list, .table-history { background: white; border-radius: 8px; overflow: hidden; border: none; }
        .table-price-list thead, .table-history thead { background-color: var(--fwu-main); color: white; }
        .table-price-list th, .table-history th { font-weight: 700; border: none; padding: 14px; vertical-align: middle; }
        .table-price-list td, .table-history td { padding: 12px 14px; border-color: #f1f1f1; vertical-align: middle; }
        
        /* 表格內部分類群組隔行樣式 */
        .category-row-header { background-color: #f8f9fa !important; font-weight: 800; color: var(--fwu-dark); letter-spacing: 1px; font-size: 0.9rem; }
        .catalog-item-title { font-size: 1.05rem; font-weight: 700; color: #222; }
        .scientific-name-style { font-style: italic; color: #555; font-size: 0.95rem; }

        .badge-loc { background-color: #e9ecef; color: #495057; font-weight: 700; padding: 5px 10px; border-radius: 5px; }
        .ts-cell { font-size: 0.75rem; color: #666; white-space: nowrap; padding: 8px !important; }

        /* 右側固定即時摘要的樣式 */
        .sticky-summary-box {
            position: -webkit-sticky;
            position: sticky;
            top: 20px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            border: 2px solid var(--fwu-main);
            border-radius: 12px;
            background: white;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }
        .summary-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px dashed #eee;
        }
    </style>
</head>
<body>

<div class="header-section shadow-sm">
    <h1 class="header-title text-uppercase">[FWU] Mayesh Weekly Order</h1>
    <ul class="nav nav-pills justify-content-center mb-3" id="mainTab" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#catalogTab">1. PRICE LIST</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#orderTab">2. PLACE ORDER</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#historyTab" onclick="loadHistory()">3. ORDER HISTORY</button></li>
    </ul>
</div>

<div class="container-fluid px-4 pb-5">
    <div class="tab-content">
        
        <div class="tab-pane fade show active" id="catalogTab">
            <div class="card mb-4 mx-auto" style="max-width: 1200px;">
                <div class="card-body tool-box">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">1. Filter Category</label>
                            <select id="toolVariety" class="form-select" onchange="onCategorySelectChange()">
                                <option value="">-- All Categories --</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">2. Packing Specification Check</label>
                            <select id="toolSpec" class="form-select" disabled onchange="calculateRate()">
                                <option value="">-- Select Spec --</option>
                            </select>
                        </div>
                        <div class="col-md-4"><div id="rateResult" class="result-inline d-none"><span id="finalRate">-</span></div></div>
                    </div>
                </div>
            </div>

            <div class="card mx-auto shadow-sm" style="max-width: 1200px;">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle table-price-list mb-0" id="priceListTable">
                            <thead>
                                <tr>
                                    <th style="width: 25%;">Variety Name</th>
                                    <th style="width: 20%;">Scientific Name</th>
                                    <th style="width: 15%;" class="text-center">Color</th>
                                    <th style="width: 13%;" class="text-center">Stem</th>
                                    <th style="width: 13%;" class="text-center">Length</th>
                                    <th style="width: 14%;" class="text-end pe-4">FOB_USD</th>
                                </tr>
                            </thead>
                            <tbody id="priceListBody">
                                <tr>
                                    <td colspan="6" class="text-center py-5 text-muted">
                                        <div class="spinner-border text-success spinner-border-sm me-2"></div>Loading Price List...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="orderTab">
            <form id="orderForm">
                <div class="row g-4">
                    
                    <div class="col-lg-9">
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <div class="card h-100">
                                    <div class="card-body">
                                        <h5 class="card-title">Location</h5>
                                        <select name="location" id="inputLocation" class="form-select" required>
                                            <option value="">-- Select Market --</option>
                                            <option value="Loc1">Loc1-- LA Market</option>
                                            <option value="Loc3">Loc3-- Orange County</option>
                                            <option value="Loc5">Loc5-- Carlsbad</option>
                                            <option value="Loc6">Loc6-- Riverside</option>
                                            <option value="Loc9">Loc9-- LAX</option>
                                            <option value="Loc10">Loc10-- Phoenix</option>
                                            <option value="Loc12">Loc12-- Oxnard</option>
                                            <option value="Loc19">Loc19-- Portland</option>
                                            <option value="Loc21">Loc21-- Seattle</option>
                                            <option value="Loc25">Loc25-- San Francisco</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="card h-100">
                                    <div class="card-body">
                                        <h5 class="card-title">Shipping Date</h5>
                                        <input type="date" name="shippingDate" id="inputDate" class="form-control" required>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div id="orderGrid" class="row g-3 row-cols-custom-4 mb-5"></div>
                    </div>

                    <div class="col-lg-3">
                        <div class="sticky-summary-box p-3">
                            <h5 class="fw-bold mb-3 pb-2 text-uppercase" style="color: var(--fwu-dark); border-bottom: 2px solid var(--fwu-main);">
                                Live Summary
                            </h5>
                            <div id="liveSummaryContent" class="text-muted small py-3 text-center">
                                No items selected yet.
                            </div>
                            <div id="liveSummaryTotal" class="mt-3 pt-2 fw-bold d-none text-end" style="border-top: 1px solid #ddd;">
                                Total Items: <span id="summaryTotalCount" class="text-success fs-5">0</span>
                            </div>
                            <div class="mt-4">
                                <button type="submit" id="submitBtn" class="btn btn-submit w-100 shadow" style="padding: 12px; font-size: 1rem;">
                                    SUBMIT ORDER
                                </button>
                            </div>
                        </div>
                    </div>

                </div>
            </form>
        </div>

        <div class="tab-pane fade" id="historyTab">
            <div class="card mx-auto" style="max-width: 1200px;">
                <div class="card-body">
                    <h5 class="card-title">Order Records</h5>
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Select Shipping Date:</label>
                            <select id="historyDateSelect" class="form-select form-select-lg" onchange="filterHistory()">
                                <option value="">-- Loading... --</option>
                            </select>
                        </div>
                    </div>
                    <div id="historyContent" class="table-responsive">
                        <div class="text-center py-5 text-muted">Select a date above to view records.</div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<div class="modal fade" id="summaryModal" data-bs-backdrop="static" tabindex="-1">
    <div class="modal-dialog modal-lg"><div class="modal-content border-0">
        <div class="modal-header bg-success text-white"><h5>Order Confirmed</h5></div>
        <div class="modal-body p-4" id="summaryList"></div>
        <div class="modal-footer"><button class="btn btn-outline-success fw-bold" onclick="downloadCSV()">Download CSV</button><button class="btn btn-secondary" onclick="window.location.reload()">New Order</button></div>
    </div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxxMVL5vqHNUHXg5Ixxy3luzugYvh0MpsVgZCrfdmLSZmhHJuGar7P6mSZ9cFgJeBdNJg/exec';
    let packRateData = [];
    let allOrders = [];
    let initialVarietiesData = [];

    function getOrderUnit(category) { return (category && category.toString().includes("Oncidium")) ? "BU" : "Box"; }
    function getPackUnit(category) { const cat = category ? category.toString() : ""; return (cat.includes("Vanda") || cat.includes("Anthurium")) ? "Stem" : "BU"; }

    window.onload = function() {
        // 請確保您的 Google Apps Script 在後端回傳這 6 個欄位的陣列資料
        // 預期後端 JSON format 範例： v[0]=Variety Name, v[1]=Intro, v[2]=img_url, v[3]=Category, v[4]=Scientific Name, v[5]=Color, v[6]=Stem, v[7]=Length, v[8]=FOB_USD
        fetch(`${GAS_URL}?action=init`).then(res => res.json()).then(data => {
            packRateData = data.packRate;
            initialVarietiesData = data.varieties;
            initTool(data.packRate);
            renderPriceListTable(data.varieties);
            renderOrderGrid(data.varieties);
        });
    };

    function initTool(rates) {
        const select = document.getElementById('toolVariety');
        const types = [...new Set(rates.slice(1).map(r => r[0]))];
        select.innerHTML = '<option value="">-- All Categories --</option>';
        types.forEach(t => { if(t) select.innerHTML += `<option value="${t}">${t}</option>`; });
    }

    function onCategorySelectChange() {
        updateSpecOptions();
        const selectedCategory = document.getElementById('toolVariety').value;
        if (!selectedCategory) {
            renderPriceListTable(initialVarietiesData);
        } else {
            const filtered = initialVarietiesData.filter(v => (v[3] || '').trim().toUpperCase() === selectedCategory.trim().toUpperCase());
            renderPriceListTable(filtered);
        }
    }

    function updateSpecOptions() {
        const type = document.getElementById('toolVariety').value;
        const specSelect = document.getElementById('toolSpec');
        specSelect.innerHTML = '<option value="">-- Select Spec --</option>';
        document.getElementById('rateResult').classList.add('d-none');
        if(!type) { specSelect.disabled = true; return; }
        specSelect.disabled = false;
        packRateData.filter(r => r[0] === type).forEach(s => { specSelect.innerHTML += `<option value="${s[2]}">${s[1]}</option>`; });
    }

    function calculateRate() {
        const rate = document.getElementById('toolSpec').value;
        const type = document.getElementById('toolVariety').value;
        if(!rate) return;
        document.getElementById('finalRate').innerText = `${rate} ${getPackUnit(type)}`;
        document.getElementById('rateResult').classList.remove('d-none');
    }

    /* 渲染全新多欄位 Price List 表格（對應新增的 Tab 欄位規格） */
    function renderPriceListTable(vars) {
        const tbody = document.getElementById('priceListBody');
        if(!vars || vars.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">No items matched the criteria.</td></tr>';
            return;
        }

        // 依據 Category (v[3]) 分類排序
        const sortedVars = [...vars].sort((a, b) => (a[3] || '').localeCompare(b[3] || ''));
        
        let currentCategory = "";
        let htmlRows = "";

        sortedVars.forEach(v => {
            const categoryName   = (v[3] || 'UNGROUPED').toUpperCase();
            const varietyName    = v[0] || '-';
            const itemIntro      = v[1] || '';
            // 請依照您 Google Sheet 實際回傳的 index 順序調整對應（以下為普遍推薦排序預設）
            const scientificName = v[4] || '-';
            const color          = v[5] || '-';
            const stem           = v[6] || '-';
            const length         = v[7] || '-';
            const fobPrice       = v[8] || '-';

            // 動態分類群組橫條
            if (categoryName !== currentCategory) {
                currentCategory = categoryName;
                htmlRows += `
                    <tr class="category-row-header">
                        <td colspan="6" class="text-uppercase fw-bold py-2 px-3 text-success" style="background-color: #f1f8e9;">
                            ➔ ${currentCategory}
                        </td>
                    </tr>
                `;
            }

            // 格式化價格顯示
            let displayPrice = fobPrice;
            if(fobPrice !== '-' && !isNaN(fobPrice) && fobPrice !== '') {
                displayPrice = '$' + parseFloat(fobPrice).toFixed(2);
            }

            // 產生 6 欄位的資料列
            htmlRows += `
                <tr>
                    <td>
                        <div class="catalog-item-title">${varietyName}</div>
                        ${itemIntro ? `<div class="box-intro text-secondary small">${itemIntro}</div>` : ''}
                    </td>
                    <td class="scientific-name-style">${scientificName}</td>
                    <td class="text-center text-muted">${color}</td>
                    <td class="text-center fw-semibold">${stem}</td>
                    <td class="text-center">${length}</td>
                    <td class="text-end fw-bold text-success pe-4">${displayPrice}</td>
                </tr>
            `;
        });

        tbody.innerHTML = htmlRows;
    }

    // 在 Place Order 下單區域
    function renderOrderGrid(vars) {
        const grid = document.getElementById('orderGrid');
        grid.innerHTML = vars.map(v => {
            const unit = getOrderUnit(v[3]);
            return `<div class="col"><div class="item-box shadow-sm"><div class="img-container"><img src="${v[2] || 'https://via.placeholder.com/1000x1414'}" class="img-item"></div><div class="box-body"><div class="box-variety">${v[3] || ''}</div><div class="box-item-name">${v[0]}</div><div class="box-intro">${v[1] || ''}</div></div><div class="order-control"><div class="input-group input-group-sm"><span class="input-group-text bg-white fw-bold">Qty</span><input type="number" class="form-control order-qty" data-name="${v[0]}" data-unit="${unit}" min="0" value="0" oninput="updateLiveSummary()"><span class="unit-label ${unit === 'BU' ? 'unit-bu' : ''}">${unit}</span></div></div></div></div>`;
        }).join('');
    }

    function updateLiveSummary() {
        const summaryContent = document.getElementById('liveSummaryContent');
        const summaryTotal = document.getElementById('liveSummaryTotal');
        const totalCountSpan = document.getElementById('summaryTotalCount');
        
        let selectedItems = [];
        let totalItemsCount = 0;

        document.querySelectorAll('.order-qty').forEach(input => {
            const val = parseInt(input.value);
            if(val > 0) {
                selectedItems.push({ name: input.dataset.name, qty: val, unit: input.dataset.unit });
                totalItemsCount += val;
            }
        });

        if(selectedItems.length === 0) {
            summaryContent.innerHTML = 'No items selected yet.';
            summaryContent.classList.add('text-muted', 'text-center');
            summaryTotal.classList.add('d-none');
            return;
        }

        summaryContent.classList.remove('text-muted', 'text-center');
        let html = '<div style="max-height: 400px; overflow-y: auto; padding-right: 5px;">';
        selectedItems.forEach(item => {
            html += `<div class="summary-item-row">
                        <span class="fw-semibold text-truncate me-2" style="max-width: 150px;" title="${item.name}">${item.name}</span>
                        <span class="badge bg-light text-dark fw-bold border">${item.qty} ${item.unit}</span>
                     </div>`;
        });
        html += '</div>';
        
        summaryContent.innerHTML = html;
        totalCountSpan.innerText = totalItemsCount;
        summaryTotal.classList.remove('d-none');
    }

    // --- History Logic ---
    function loadHistory() {
        const historyDiv = document.getElementById('historyContent');
        historyDiv.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-success"></div><p>Fetching records...</p></div>';
        fetch(`${GAS_URL}?action=getOrders`).then(res => res.json()).then(data => {
            allOrders = data.slice(1);
            const rawDates = [...new Set(allOrders.map(row => row[2]))];
            const sortedDates = rawDates.filter(d => d).sort().reverse();
            const dateSelect = document.getElementById('historyDateSelect');
            if(sortedDates.length === 0) {
                dateSelect.innerHTML = '<option value="">-- No Records --</option>';
                historyDiv.innerHTML = '<div class="text-center py-5">No history yet.</div>';
                return;
            }
            dateSelect.innerHTML = '<option value="">-- Select Shipping Date --</option>';
            sortedDates.forEach(d => {
                const displayDate = new Date(d).toLocaleDateString('en-CA');
                dateSelect.innerHTML += `<option value="${d}">${displayDate}</option>`;
            });
            historyDiv.innerHTML = '<div class="text-center py-5 text-muted">Select a date above.</div>';
        });
    }

    function filterHistory() {
        const selectedDate = document.getElementById('historyDateSelect').value;
        const historyDiv = document.getElementById('historyContent');
        if(!selectedDate) return;

        const filtered = allOrders.filter(row => row[2] == selectedDate);
        if(filtered.length === 0) {
            historyDiv.innerHTML = '<div class="text-center py-5">No data.</div>';
            return;
        }

        const locGroups = {};
        filtered.forEach(row => {
            const dateObj = new Date(row[0]);
            const ts = dateObj.getFullYear() + '-' + 
                       String(dateObj.getMonth() + 1).padStart(2, '0') + '-' + 
                       String(dateObj.getDate()).padStart(2, '0') + ' ' + 
                       dateObj.toTimeString().split(' ')[0];
            
            const loc = row[1], varName = row[3], qtyStr = row[4];
            if(!locGroups[loc]) locGroups[loc] = [];
            locGroups[loc].push({ ts: ts, name: varName, qty: qtyStr });
        });

        let html = `<table class="table table-bordered table-history align-middle">
                        <thead><tr><th>Location</th><th>Submit Time (Full)</th><th>Variety Name</th><th class="text-end">Qty / Unit</th></tr></thead>
                        <tbody>`;
        
        for(let loc in locGroups) {
            const rowCount = locGroups[loc].length;
            locGroups[loc].forEach((item, index) => {
                html += `<tr>`;
                if(index === 0) {
                    html += `<td rowspan="${rowCount}" class="fw-bold"><span class="badge-loc">${loc}</span></td>`;
                }
                html += `<td class="ts-cell font-monospace">${item.ts}</td><td>${item.name}</td><td class="text-end fw-bold text-success">${item.qty}</td></tr>`;
            });
        }
        html += `</tbody></table>`;
        historyDiv.innerHTML = html;
    }

    // --- Submission & CSV ---
    document.getElementById('orderForm').onsubmit = function(e) {
        e.preventDefault();
        const items = [];
        document.querySelectorAll('.order-qty').forEach(input => {
            if(parseInt(input.value) > 0) items.push({ name: input.dataset.name, qty: input.value, unit: input.dataset.unit });
        });
        if(items.length === 0) return alert("Select items.");
        const payload = { location: document.getElementById('inputLocation').value, shippingDate: document.getElementById('inputDate').value, items: items };
        fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) }).then(res => res.json()).then(res => {
            window.lastOrderInfo = payload;
            let html = `<h6>Market: ${payload.location}</h6><table class="table table-sm">`;
            items.forEach(i => html += `<tr><td>${i.name}</td><td class="text-end"><strong>${i.qty} ${i.unit}</strong></td></tr>`);
            document.getElementById('summaryList').innerHTML = html + "</table>";
            new bootstrap.Modal(document.getElementById('summaryModal')).show();
        });
    };

    function downloadCSV() {
        const info = window.lastOrderInfo;
        let csv = "\uFEFF"; 
        csv += `Location,${info.location}\nShipping Date,${info.shippingDate}\n\nVariety,Qty,Unit\n`;
        info.items.forEach(i => { csv += `"${i.name}",${i.qty},${i.unit}\n`; });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Order_${info.location}_${info.shippingDate}.csv`.replace(/\s+/g, '_');
        link.click();
    }
</script>
</body>
</html>
