<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[FWU] Mayesh Weekly Order</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --fwu-main: #95c51b; --fwu-dark: #7aa314; }
        body { background-color: #f4f7f6; color: #333; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        
        /* Header & Navigation */
        .header-section { background: white; padding: 30px 0 10px 0; border-bottom: 5px solid var(--fwu-main); text-align: center; margin-bottom: 20px; }
        .header-title { color: var(--fwu-main); font-weight: 800; letter-spacing: 2px; margin-bottom: 20px; }
        
        .nav-pills .nav-link { color: #666; font-weight: 600; border-radius: 30px; padding: 10px 30px; margin: 0 10px; border: 1px solid #ddd; }
        .nav-pills .nav-link.active { background-color: var(--fwu-main); border-color: var(--fwu-main); color: white; }

        /* Section Titles */
        .card-title { color: var(--fwu-main); font-weight: 700; border-left: 5px solid var(--fwu-main); padding-left: 12px; margin-bottom: 20px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }

        /* Catalog - Pack Rate UX Optimized (Grid Cards) */
        .pack-grid-box { 
            background: white; border: 1px solid #e0e0e0; border-radius: 10px; padding: 15px; 
            text-align: center; height: 100%; transition: 0.3s;
        }
        .pack-grid-box:hover { border-color: var(--fwu-main); background: #f9fff0; }
        .pack-variety { font-weight: 700; color: #333; font-size: 1rem; margin-bottom: 5px; }
        .pack-spec { color: var(--fwu-main); font-size: 0.85rem; font-weight: 600; margin-bottom: 10px; }
        .pack-details { font-size: 0.8rem; color: #666; background: #f1f1f1; border-radius: 5px; padding: 5px; }

        /* Product Box */
        .item-box { border: 1px solid #eee; border-radius: 12px; background: white; height: 100%; display: flex; flex-direction: column; overflow: hidden; transition: 0.3s; }
        .item-box:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .item-img-container { width: 100%; height: 480px; overflow: hidden; background: #fff; border-bottom: 1px solid #f0f0f0; }
        .item-img { width: 100%; height: 100%; object-fit: contain; }
        .item-content { padding: 18px; flex-grow: 1; display: flex; flex-direction: column; }
        .item-type { color: var(--fwu-main); font-size: 0.75rem; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .item-name { font-size: 1.25rem; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
        .item-intro { font-size: 0.85rem; color: #6c757d; line-height: 1.5; margin-bottom: 15px; }
        
        /* Order Input */
        .order-action { margin-top: auto; padding-top: 15px; border-top: 1px solid #f0f0f0; }
        .unit-label { background: #f8f9fa; border: 1px solid #ced4da; border-left: none; padding: 0.375rem 0.75rem; border-radius: 0 0.375rem 0.375rem 0; font-weight: 800; min-width: 65px; text-align: center; }
        .unit-bu { color: white; background: var(--fwu-main); border-color: var(--fwu-main); }

        .btn-submit { background-color: var(--fwu-main); border: none; padding: 18px; font-weight: bold; border-radius: 12px; font-size: 1.25rem; color: white; }
        .btn-submit:hover { background-color: var(--fwu-dark); color: white; }
    </style>
</head>
<body>

<div class="header-section shadow-sm">
    <h1 class="header-title text-uppercase">[FWU] Mayesh Weekly Order</h1>
    <ul class="nav nav-pills justify-content-center mb-3" id="mainTab" role="tablist">
        <li class="nav-item">
            <button class="nav-link active" id="catalog-tab" data-bs-toggle="pill" data-bs-target="#catalog" type="button">1. CATALOG</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" id="order-tab" data-bs-toggle="pill" data-bs-target="#order" type="button">2. PLACE ORDER</button>
        </li>
    </ul>
</div>

<div class="container pb-5">
    <div class="tab-content" id="mainTabContent">
        
        <div class="tab-pane fade show active" id="catalog" role="tabpanel">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Shipping Pack Rate Reference</h5>
                    <div id="packRateGrid" class="row row-cols-2 row-cols-md-4 row-cols-lg-6 g-3">
                        </div>
                </div>
            </div>

            <h5 class="card-title mb-4">Variety Gallery</h5>
            <div id="catalogGrid" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
                </div>
        </div>

        <div class="tab-pane fade" id="order" role="tabpanel">
            <form id="orderForm">
                <div class="row">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-body">
                                <h5 class="card-title">Location Choosing</h5>
                                <select name="location" id="inputLocation" class="form-select form-select-lg" required>
                                    <option value="">-- Select Your Market --</option>
                                    <option value="Loc1">Loc1-- LA Market</option>
                                    <option value="Loc3">Loc3-- Orange County</option>
                                    <option value="Loc5">Loc5-- Carlsbad</option>
                                    <option value="Loc6">Loc6-- Riverside</option>
                                    <option value="Loc9">Loc9-- LAX</option>
                                    <option value="Loc10">Loc10-- Phoenix</option>
                                    <option value="Loc12">Loc12-- Oxnard</option>
                                    <option value="Loc19">Loc19-- Portland</option>
                                    <option value="Loc21">Loc21-- Seattle</option>
                                    <option value="Loc25">Loc25-- San Francisco</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-body">
                                <h5 class="card-title">Expected Shipping Date</h5>
                                <input type="date" name="shippingDate" id="inputDate" class="form-control form-control-lg" required>
                            </div>
                        </div>
                    </div>
                </div>

                <h5 class="card-title mb-4">Quick Order List</h5>
                <div id="orderGrid" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 mb-5">
                    </div>

                <button type="submit" id="submitBtn" class="btn btn-submit w-100 shadow">CONFIRM & SUBMIT ORDER</button>
            </form>
        </div>

    </div>
</div>

<div class="modal fade" id="summaryModal" data-bs-backdrop="static" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header bg-success text-white"><h5>Order Submitted!</h5></div>
            <div class="modal-body p-4" id="summaryList"></div>
            <div class="modal-footer bg-light">
                <button class="btn btn-outline-success fw-bold" onclick="downloadCSV()">Download Record (CSV)</button>
                <button class="btn btn-secondary" onclick="window.location.reload()">New Order</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxxMVL5vqHNUHXg5Ixxy3luzugYvh0MpsVgZCrfdmLSZmhHJuGar7P6mSZ9cFgJeBdNJg/exec';
    window.lastOrderInfo = { location: '', date: '', items: [] };

    window.onload = function() {
        fetch(`${GAS_URL}?action=init`)
        .then(res => res.json())
        .then(data => {
            renderPackRateOptimized(data.packRate);
            renderVarieties(data.varieties);
        });
    };

    function renderPackRateOptimized(data) {
        const grid = document.getElementById('packRateGrid');
        // 假設截圖中的欄位順序：0:Variety, 1:Spec, 2:Box1, 3:Rate1, 4:Box2, 5:Rate2
        grid.innerHTML = data.slice(1).map(r => `
            <div class="col">
                <div class="pack-grid-box">
                    <div class="pack-variety">${r[0]}</div>
                    <div class="pack-spec">${r[1]}</div>
                    <div class="pack-details">
                        ${r[2]}: ${r[3]}<br>
                        ${r[4] ? `${r[4]}: ${r[5]}` : ''}
                    </div>
                </div>
            </div>
        `).join('');
    }

    function renderVarieties(vars) {
        const catalogGrid = document.getElementById('catalogGrid');
        const orderGrid = document.getElementById('orderGrid');

        let catalogHtml = '';
        let orderHtml = '';

        vars.forEach(v => {
            const name = v[0], intro = v[1], imgUrl = v[2], category = v[3];
            const isOncidium = category && category.toString().toLowerCase().includes('oncidium');
            const unit = isOncidium ? 'BU' : 'Box';
            const img = imgUrl || 'https://via.placeholder.com/1000x1414?text=Flower';

            const commonCard = `
                <div class="item-box">
                    <div class="item-img-container"><img src="${img}" class="item-img"></div>
                    <div class="item-content">
                        <div class="item-type">${category || ''}</div>
                        <div class="item-name">${name}</div>
                        <div class="item-intro">${intro || ''}</div>
            `;

            catalogHtml += commonCard + `</div></div></div>`;
            
            orderHtml += commonCard + `
                        <div class="order-action">
                            <div class="input-group">
                                <span class="input-group-text bg-white fw-bold">Qty</span>
                                <input type="number" class="form-control order-qty" data-name="${name}" data-unit="${unit}" min="0" value="0">
                                <span class="unit-label ${unit === 'BU' ? 'unit-bu' : ''}">${unit}</span>
                            </div>
                        </div>
                    </div></div></div>`;
        });

        catalogGrid.innerHTML = catalogHtml;
        orderGrid.innerHTML = orderHtml;
    }

    // 提交與下載邏輯 (維持先前正確版本)
    document.getElementById('orderForm').onsubmit = function(e) {
        e.preventDefault();
        const items = [];
        document.querySelectorAll('.order-qty').forEach(input => {
            if(parseInt(input.value) > 0) items.push({ name: input.dataset.name, qty: input.value, unit: input.dataset.unit });
        });
        if(items.length === 0) return alert("Select at least one item.");

        const payload = { location: document.getElementById('inputLocation').value, shippingDate: document.getElementById('inputDate').value, items: items };
        fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })
        .then(res => res.json()).then(res => {
            if(res.result === 'success') {
                window.lastOrderInfo = payload;
                let html = `<p><strong>Market:</strong> ${payload.location}</p><p><strong>Shipping Date:</strong> ${payload.shippingDate}</p><hr><table class="table">`;
                items.forEach(i => html += `<tr><td>${i.name}</td><td class="text-end"><strong>${i.qty} ${i.unit}</strong></td></tr>`);
                document.getElementById('summaryList').innerHTML = html + "</table>";
                new bootstrap.Modal(document.getElementById('summaryModal')).show();
            }
        });
    };

    function downloadCSV() {
        const info = window.lastOrderInfo;
        let csv = "\uFEFFLocation,${info.location}\nShipping Date,${info.date || info.shippingDate}\n\nVariety,Quantity,Unit\n";
        info.items.forEach(i => csv += `"${i.name}",${i.qty},${i.unit}\n`);
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
        link.download = `FWU_Order_${info.location}_${info.shippingDate}.csv`;
        link.click();
    }
</script>
</body>
</html>
